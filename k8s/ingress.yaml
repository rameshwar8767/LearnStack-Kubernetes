apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: learnstack-ingress
  namespace: learnstack
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: learnstack.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: learnstack-svc
                port:
                  number: 80
